{% if page_obj.paginator.num_pages > 1 %}
<nav class="pagination" aria-label="Sahifalar">
  {% if page_obj.has_previous %}
    <a class="page-link" href="?page=1" aria-label="Birinchi sahifa">&laquo;</a>
    <a class="page-link" href="?page={{ page_obj.previous_page_number }}">Oldingi</a>
  {% endif %}
  <span class="page-link is-active" aria-current="page">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a class="page-link" href="?page={{ page_obj.next_page_number }}">Keyingi</a>
    <a class="page-link" href="?page={{ page_obj.paginator.num_pages }}" aria-label="Oxirgi sahifa">&raquo;</a>
  {% endif %}
</nav>
{% endif %}
